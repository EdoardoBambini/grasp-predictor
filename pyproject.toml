[tool.poetry]
name = "grasp-integrity-predictor"
version = "0.1.0"
description = "Binary failure classifier for robotic grasp integrity using Mosaico SDK and PyTorch"
authors = []
readme = "README.md"
packages = [{ include = "grasp_integrity_predictor" }]

[tool.poetry.dependencies]
python = ">=3.13,<4"

# Mosaico SDK (local development install)
mosaicolabs = { path = "../../mosaico-marco/mosaico-sdk-py", develop = true }

# ML stack
torch = ">=2.2.0"
numpy = ">=2.0.0"
pandas = ">=2.0.0"
scikit-learn = ">=1.4.0"

# Time series model: tsai (timeseriesAI/tsai on GitHub)
# LSTMPlus: production LSTM for time series classification
# https://github.com/timeseriesAI/tsai
tsai = ">=0.3.9"

# Config management
hydra-core = ">=1.3.0"
omegaconf = ">=2.3.0"

# Simulation
mujoco = ">=3.0.0"

# Validation
pydantic = ">=2.0.0"

# Utilities
pyarrow = ">=22.0.0"
tqdm = ">=4.66.0"

[tool.poetry.group.dev.dependencies]
pytest = ">=8.0.0"
pytest-cov = ">=5.0.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
